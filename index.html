<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%91%8B%3C/text%3E%3C/svg%3E">
  <title>S.U Counter👋</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #ff8d8d, #6610f2);
      color: white;
    }

    .card {
      border-radius: 20px;
      background: white;
      color: black;
    }

    .contador {
      font-size: 4rem;
      font-weight: bold;
      transition: transform 0.2s;
    }

    .tap {
      animation: bounce 0.3s;
    }

    @keyframes bounce {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .btn-tapa {
      font-size: 1.3rem;
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4 text-center" style="width: 50rem;">
    <h2 class="mb-3">👋 Slap Unit Counter (S.U Counter)</h2>

    <div id="contador" class="contador text-primary mb-3">...</div>

    <button class="btn btn-primary btn-lg w-100 mb-2 btn-tapa" onclick="darTapa()">
      Registry Slap 👋
    </button>

  </div>

  <!-- Som -->
  <audio id="somTapa" src="https://www.soundjay.com/human/slap-01.mp3"></audio>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { collection, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    

  const firebaseConfig = {
    apiKey: "AIzaSyChYPaRdyzOeDV66k1YG6Agg_nhdFYB7Zs",
    authDomain: "su-counter.firebaseapp.com",
    projectId: "su-counter",
    storageBucket: "su-counter.firebasestorage.app",
    messagingSenderId: "556879859760",
    appId: "1:556879859760:web:18ccca9d6a7e17049b1df5",
    measurementId: "G-2Z915G8CBH"
  };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const contadorRef = doc(db, "contador", "global");
    const contadorEl = document.getElementById("contador");
    const som = document.getElementById("somTapa");

    let valorAtual = 0;

    // 🔄 Atualização em tempo real
    onSnapshot(contadorRef, (docSnap) => {
      if (docSnap.exists()) {
        valorAtual = docSnap.data().valor;
        contadorEl.innerText = valorAtual;
      }
    });

    // 👋 Tapa
const eventosRef = collection(db, "eventos");

window.darTapa = async function () {
  try {
    const agora = new Date();

    // 🧠 formatar dia e mês
    const dia = agora.toISOString().split("T")[0]; // YYYY-MM-DD
    const mes = dia.substring(0, 7); // YYYY-MM

    // 🔥 incrementa contador global (seguro)
    await updateDoc(contadorRef, {
      valor: increment(1)
    });

    // 📝 salva evento
    await addDoc(eventosRef, {
      tipo: "slap",
      data: serverTimestamp(),
      dia: dia,
      mes: mes
    });

    animar();
    som.play();

  } catch (e) {
    console.error("Erro:", e);
  }
};

    // 🔁 Reset
window.resetar = async function () {
  try {
    const agora = new Date();

    const dia = agora.toISOString().split("T")[0];
    const mes = dia.substring(0, 7);

    // 🔄 Zera contador global
    await updateDoc(contadorRef, {
      valor: 0
    });

    // 📝 Registra evento de reset
    await addDoc(eventosRef, {
      tipo: "reset",
      data: serverTimestamp(),
      dia: dia,
      mes: mes
    });

  } catch (e) {
    console.error("Erro ao resetar:", e);
  }
};

    // 🎬 Animação
    function animar() {
      contadorEl.classList.add("tap");

      setTimeout(() => {
        contadorEl.classList.remove("tap");
      }, 300);
    }

  </script>

</body>
</html>
