<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%91%8B%3C/text%3E%3C/svg%3E">
  <title>S.U Counter👋</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4 text-center" style="width: 50rem;">
    <h2 class="mb-3">👋 Slap Unit Counter (S.U Counter)</h2>

    <div id="aba-contador" class="mt-3">

      <div class="card shadow p-3 text-center" style="width: 350px; margin: auto;">
        <h2 class="mb-3">Contador</h2>

        <div id="contador" class="contador text-primary mb-3">0</div>

        <!-- 👋 BOTÃO DE TAPA -->
        <button class="btn btn-danger btn-lg w-100 mb-2" onclick="darTapa()">
          Dar um tapa 👋
        </button>

      </div>

    </div>

    <div id="aba-dashboard" class="pt-5">
      
      <!-- filtros -->
      <div class="mb-3" style="width: 20%; margin: auto;">
        <select id="periodoSelect" class="form-select" onchange="carregarGrafico()">
          <option value="dia">Por dia</option>
          <option value="mes">Por mês</option>
          <option value="ano">Por ano</option>
        </select>
      </div>

      <canvas id="grafico"></canvas>
    </div>

  </div>

  <!-- Som -->
  <audio id="somTapa" src="./slap-sound-effect-free.mp3"></audio>

  <!-- Firebase -->
  <script src="./script.js" type="module"></script>
</body>
</html>
